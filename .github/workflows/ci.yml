name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

  smoke-local-credits:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create local worker env file
        run: |
          cat > .dev.vars <<'EOF'
          WEBHOOK_SHARED_SECRET=ci-webhook-secret
          API_SIGNING_SECRET=ci-api-signing-secret
          ADMIN_API_SECRET=ci-admin-secret
          ADMIN_ROUTES_ENABLED=true
          DEBUG_ROUTES_ENABLED=true
          SES_MOCK_SEND=true
          SES_MOCK_SEND_DELAY_MS=1500
          X402_PAY_TO=0x0b4fbD3AA802B9eAE9c5F6D4B5FE7ADd6eB1D3D2
          EOF

      - name: Apply local D1 migrations
        run: npm run d1:migrate:local

      - name: Seed local D1 demo data
        run: npm run d1:seed:local

      - name: Run outbound credit smoke
        env:
          ADMIN_API_SECRET_FOR_SMOKE: ci-admin-secret
        run: npm run smoke:credits:local:auto
