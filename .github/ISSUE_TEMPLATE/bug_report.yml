name: Bug report
description: Report a bug or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A clear and concise description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Configure ...
        2. Send request ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include runtime context that matters.
      placeholder: local / dev / staging / production, Node version, Wrangler version, provider details

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Redact secrets before pasting.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed any secrets or sensitive infrastructure details
          required: true

