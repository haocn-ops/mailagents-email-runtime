openapi: 3.1.0
info:
  title: AI Agent Email Runtime API
  version: 0.1.0
  summary: Control plane and data plane API for an email-first AI agent runtime
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
tags:
  - name: Agents
  - name: Auth
  - name: Debug
  - name: Mailboxes
  - name: Tasks
  - name: Messages
  - name: Threads
  - name: Drafts
  - name: Webhooks
paths:
  /public/signup:
    get:
      tags: [Auth]
      summary: Redirect to the public signup page
      security: []
      responses:
        '302':
          description: Redirect to the hosted signup page
    head:
      tags: [Auth]
      summary: Redirect to the public signup page
      security: []
      responses:
        '302':
          description: Redirect to the hosted signup page
    post:
      tags: [Auth]
      summary: Create a self-serve mailbox and default mailbox-scoped access token
      operationId: publicSignup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicSignupRequest'
      responses:
        '201':
          description: Mailbox created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSignupResult'
        '400':
          description: Invalid signup request
        '502':
          description: Provisioning failed
  /public/token/reissue:
    post:
      tags: [Auth]
      summary: Reissue a self-serve mailbox access token by email
      operationId: publicTokenReissue
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicTokenReissueRequest'
      responses:
        '202':
          description: Request accepted. If the mailbox exists, a refreshed token will be emailed to the original operator inbox.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicTokenReissueAccepted'
  /v1/auth/tokens:
    post:
      tags: [Auth]
      summary: Mint a signed bearer token
      operationId: createAccessToken
      security: []
      parameters:
        - name: x-admin-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sub, tenantId, scopes]
              properties:
                sub:
                  type: string
                tenantId:
                  type: string
                agentId:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                mailboxIds:
                  type: array
                  items:
                    type: string
                expiresInSeconds:
                  type: integer
      responses:
        '201':
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                required: [token, expiresAt]
                properties:
                  token:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
  /v1/auth/token/rotate:
    post:
      tags: [Auth]
      summary: Rotate a still-valid bearer token
      operationId: rotateAccessToken
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateAccessTokenRequest'
      responses:
        '201':
          description: Rotated token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateAccessTokenResult'
  /v1/debug/agents/{agentId}:
    get:
      tags: [Debug]
      summary: Inspect agent state
      security: []
      parameters:
        - name: x-admin-secret
          in: header
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent state
  /v1/debug/mailboxes/{mailboxId}:
    get:
      tags: [Debug]
      summary: Inspect mailbox state
      security: []
      parameters:
        - name: x-admin-secret
          in: header
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/MailboxId'
      responses:
        '200':
          description: Mailbox state
  /v1/debug/messages/{messageId}:
    get:
      tags: [Debug]
      summary: Inspect message state and delivery events
      security: []
      parameters:
        - name: x-admin-secret
          in: header
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Message state and delivery events
  /v1/debug/drafts/{draftId}:
    get:
      tags: [Debug]
      summary: Inspect draft state and payload
      security: []
      parameters:
        - name: x-admin-secret
          in: header
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/DraftId'
      responses:
        '200':
          description: Draft state
  /v1/debug/outbound-jobs/{outboundJobId}:
    get:
      tags: [Debug]
      summary: Inspect outbound job state
      security: []
      parameters:
        - name: x-admin-secret
          in: header
          required: true
          schema:
            type: string
        - name: outboundJobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Outbound job state
  /v1/debug/suppressions/{email}:
    get:
      tags: [Debug]
      summary: Inspect suppression state for an email address
      security: []
      parameters:
        - name: x-admin-secret
          in: header
          required: true
          schema:
            type: string
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Suppression state
  /v1/agents:
    get:
      tags: [Agents]
      summary: List agents
      operationId: listAgents
      parameters:
        - name: tenantId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Agents
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Agent'
    post:
      tags: [Agents]
      summary: Create an agent
      operationId: createAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
  /v1/agents/{agentId}:
    get:
      tags: [Agents]
      summary: Get an agent
      operationId: getAgent
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
    patch:
      tags: [Agents]
      summary: Update an agent
      operationId: updateAgent
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentRequest'
      responses:
        '200':
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
  /v1/agents/{agentId}/mailboxes:
    post:
      tags: [Mailboxes]
      summary: Bind a mailbox to an agent
      operationId: bindMailboxToAgent
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindMailboxRequest'
      responses:
        '201':
          description: Binding created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentMailboxBinding'
    get:
      tags: [Mailboxes]
      summary: List mailboxes for an agent
      operationId: listAgentMailboxes
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Mailboxes
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentMailboxBinding'
  /v1/agents/{agentId}/policy:
    put:
      tags: [Agents]
      summary: Upsert agent policy
      operationId: upsertAgentPolicy
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertAgentPolicyRequest'
      responses:
        '200':
          description: Policy saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentPolicy'
  /v1/agents/{agentId}/tasks:
    get:
      tags: [Tasks]
      summary: List tasks for an agent
      operationId: listAgentTasks
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskStatus'
      responses:
        '200':
          description: Tasks
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
  /v1/agents/{agentId}/versions:
    post:
      tags: [Agents]
      summary: Create an agent version
      operationId: createAgentVersion
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentVersionRequest'
      responses:
        '201':
          description: Agent version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersion'
    get:
      tags: [Agents]
      summary: List versions for an agent
      operationId: listAgentVersions
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent versions
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentVersion'
  /v1/agents/{agentId}/versions/{versionId}:
    get:
      tags: [Agents]
      summary: Get an agent version
      operationId: getAgentVersion
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Agent version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersion'
  /v1/agents/{agentId}/deployments:
    post:
      tags: [Agents]
      summary: Create an agent deployment
      operationId: createAgentDeployment
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentDeploymentRequest'
      responses:
        '201':
          description: Agent deployment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDeployment'
    get:
      tags: [Agents]
      summary: List deployments for an agent
      operationId: listAgentDeployments
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Agent deployments
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentDeployment'
  /v1/agents/{agentId}/deployments/rollout:
    post:
      tags: [Agents]
      summary: Roll out a new deployment for a target
      operationId: rolloutAgentDeployment
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolloutAgentDeploymentRequest'
      responses:
        '201':
          description: Agent deployment rolled out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDeployment'
  /v1/agents/{agentId}/deployments/{deploymentId}:
    patch:
      tags: [Agents]
      summary: Update deployment status
      operationId: updateAgentDeploymentStatus
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/DeploymentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentDeploymentStatusRequest'
      responses:
        '200':
          description: Agent deployment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDeployment'
  /v1/agents/{agentId}/deployments/{deploymentId}/rollback:
    post:
      tags: [Agents]
      summary: Roll back to a prior deployment
      operationId: rollbackAgentDeployment
      parameters:
        - $ref: '#/components/parameters/AgentId'
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '200':
          description: Agent deployment rolled back
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDeployment'
  /v1/messages/{messageId}:
    get:
      tags: [Messages]
      summary: Get message metadata
      operationId: getMessage
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
  /v1/messages/{messageId}/content:
    get:
      tags: [Messages]
      summary: Get normalized message content
      operationId: getMessageContent
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: Message content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageContent'
  /v1/messages/{messageId}/replay:
    post:
      tags: [Messages]
      summary: Replay a stored message
      operationId: replayMessage
      parameters:
        - $ref: '#/components/parameters/MessageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplayMessageRequest'
      responses:
        '202':
          description: Replay accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplayAccepted'
  /v1/threads/{threadId}:
    get:
      tags: [Threads]
      summary: Get a thread
      operationId: getThread
      parameters:
        - $ref: '#/components/parameters/ThreadId'
      responses:
        '200':
          description: Thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
  /v1/agents/{agentId}/drafts:
    post:
      tags: [Drafts]
      summary: Create a draft
      operationId: createDraft
      parameters:
        - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftRequest'
      responses:
        '201':
          description: Draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
  /v1/drafts/{draftId}:
    get:
      tags: [Drafts]
      summary: Get a draft
      operationId: getDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      responses:
        '200':
          description: Draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draft'
  /v1/drafts/{draftId}/send:
    post:
      tags: [Drafts]
      summary: Enqueue a draft for sending
      operationId: sendDraft
      parameters:
        - $ref: '#/components/parameters/DraftId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendDraftRequest'
      responses:
        '202':
          description: Draft accepted for sending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendDraftAccepted'
  /v1/webhooks/ses:
    post:
      tags: [Webhooks]
      summary: Receive SES delivery events
      operationId: receiveSesWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SesWebhookEvent'
      responses:
        '202':
          description: Event accepted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
    MessageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
    MailboxId:
      name: mailboxId
      in: path
      required: true
      schema:
        type: string
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
    DraftId:
      name: draftId
      in: path
      required: true
      schema:
        type: string
    DeploymentId:
      name: deploymentId
      in: path
      required: true
      schema:
        type: string
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
  schemas:
    AgentMode:
      type: string
      enum: [assistant, autonomous, review_only]
    AgentStatus:
      type: string
      enum: [draft, active, disabled, archived]
    AgentVersionStatus:
      type: string
      enum: [draft, published, deprecated]
    AgentDeploymentStatus:
      type: string
      enum: [active, paused, rolled_back]
    TaskStatus:
      type: string
      enum: [queued, running, done, needs_review, failed]
    DraftStatus:
      type: string
      enum: [draft, approved, queued, sent, cancelled, failed]
    MessageStatus:
      type: string
      enum: [received, normalized, tasked, replied, ignored, failed]
    OutboundJobStatus:
      type: string
      enum: [queued, sending, sent, retry, failed]
    Agent:
      type: object
      required: [id, tenantId, name, status, mode, createdAt, updatedAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/AgentStatus'
        mode:
          $ref: '#/components/schemas/AgentMode'
        configR2Key:
          type: string
        defaultVersionId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateAgentRequest:
      type: object
      required: [tenantId, name, mode]
      properties:
        tenantId:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        mode:
          $ref: '#/components/schemas/AgentMode'
        config:
          type: object
          additionalProperties: true
    UpdateAgentRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/AgentStatus'
        mode:
          $ref: '#/components/schemas/AgentMode'
        config:
          type: object
          additionalProperties: true
        defaultVersionId:
          type: string
    AgentVersion:
      type: object
      required: [id, agentId, version, status, createdAt]
      properties:
        id:
          type: string
        agentId:
          type: string
        version:
          type: string
        model:
          type: string
        configR2Key:
          type: string
        manifestR2Key:
          type: string
        status:
          $ref: '#/components/schemas/AgentVersionStatus'
        createdAt:
          type: string
          format: date-time
    CreateAgentVersionRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
        model:
          type: string
        config:
          type: object
          additionalProperties: true
        manifest:
          type: object
          additionalProperties: true
        status:
          $ref: '#/components/schemas/AgentVersionStatus'
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/AgentCapability'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/AgentToolBinding'
    AgentCapability:
      type: object
      required: [capability]
      properties:
        id:
          type: string
        capability:
          type: string
        config:
          type: object
          additionalProperties: true
    AgentToolBinding:
      type: object
      required: [toolName]
      properties:
        id:
          type: string
        toolName:
          type: string
        enabled:
          type: boolean
        config:
          type: object
          additionalProperties: true
    AgentDeployment:
      type: object
      required: [id, tenantId, agentId, agentVersionId, targetType, targetId, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        agentId:
          type: string
        agentVersionId:
          type: string
        targetType:
          type: string
          enum: [mailbox, workflow, tenant_default]
        targetId:
          type: string
        status:
          $ref: '#/components/schemas/AgentDeploymentStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateAgentDeploymentRequest:
      type: object
      required: [tenantId, agentVersionId, targetType, targetId]
      properties:
        tenantId:
          type: string
        agentVersionId:
          type: string
        targetType:
          type: string
          enum: [mailbox, workflow, tenant_default]
        targetId:
          type: string
        status:
          $ref: '#/components/schemas/AgentDeploymentStatus'
    RolloutAgentDeploymentRequest:
      type: object
      required: [tenantId, agentVersionId, targetType, targetId]
      properties:
        tenantId:
          type: string
        agentVersionId:
          type: string
        targetType:
          type: string
          enum: [mailbox, workflow, tenant_default]
        targetId:
          type: string
    UpdateAgentDeploymentStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/AgentDeploymentStatus'
    AgentMailboxBinding:
      type: object
      required: [id, agentId, mailboxId, role, status, createdAt]
      properties:
        id:
          type: string
        agentId:
          type: string
        mailboxId:
          type: string
        role:
          type: string
          enum: [primary, shared, send_only, receive_only]
        status:
          type: string
          enum: [active, disabled]
        createdAt:
          type: string
          format: date-time
    BindMailboxRequest:
      type: object
      required: [tenantId, mailboxId, role]
      properties:
        tenantId:
          type: string
        mailboxId:
          type: string
        role:
          type: string
          enum: [primary, shared, send_only, receive_only]
    PublicSignupRequest:
      type: object
      required: [mailboxAlias, agentName, operatorEmail, productName, useCase]
      properties:
        mailboxAlias:
          type: string
        agentName:
          type: string
        operatorEmail:
          type: string
          format: email
        productName:
          type: string
        useCase:
          type: string
    PublicSignupResult:
      type: object
      required:
        [
          tenantId,
          productName,
          operatorEmail,
          mailboxAddress,
          mailboxId,
          agentId,
          agentVersionId,
          deploymentId,
          accessTokenScopes,
          welcomeStatus
        ]
      properties:
        tenantId:
          type: string
        productName:
          type: string
        operatorEmail:
          type: string
          format: email
        mailboxAddress:
          type: string
          format: email
        mailboxId:
          type: string
        agentId:
          type: string
        agentVersionId:
          type: string
        deploymentId:
          type: string
        accessToken:
          type: string
          description: Mailbox-scoped bearer token issued during self-serve signup when API signing is configured.
        accessTokenExpiresAt:
          type: string
          format: date-time
        accessTokenScopes:
          type: array
          items:
            type: string
        outboundJobId:
          type: string
        welcomeStatus:
          type: string
          enum: [queued, failed]
        welcomeError:
          type: string
    PublicTokenReissueRequest:
      type: object
      properties:
        mailboxAlias:
          type: string
        mailboxAddress:
          type: string
          format: email
      description: Provide either mailboxAlias or mailboxAddress. The API always returns a generic acceptance response and never returns the refreshed token directly.
    PublicTokenReissueAccepted:
      type: object
      required: [accepted, message]
      properties:
        accepted:
          type: boolean
        message:
          type: string
      description: Generic acceptance response. The endpoint does not disclose mailbox existence, applies mailbox cooldowns and source-IP rate limits, and only emails refreshed tokens to the original operator inbox.
    RotateAccessTokenRequest:
      type: object
      properties:
        delivery:
          type: string
          enum: [inline, self_mailbox, both]
        mailboxId:
          type: string
      description: Authenticated proactive rotation for callers that still hold a valid bearer token. Use self_mailbox or both when the refreshed token should also be delivered back to a mailbox covered by the current token.
    RotateAccessTokenResult:
      type: object
      required: [expiresAt, scopes, delivery, deliveryStatus, oldTokenRemainsValid]
      properties:
        token:
          type: string
          description: Omitted when delivery is self_mailbox only.
        expiresAt:
          type: string
          format: date-time
        scopes:
          type: array
          items:
            type: string
        delivery:
          type: string
          enum: [inline, self_mailbox, both]
        deliveryStatus:
          type: string
          enum: [skipped, queued, unavailable]
        deliveryMailboxId:
          type: string
        oldTokenRemainsValid:
          type: boolean
