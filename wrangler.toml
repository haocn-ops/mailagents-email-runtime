name = "mailagents-local"
main = "src/index.ts"
compatibility_date = "2026-03-16"

[observability]
enabled = true

[triggers]
crons = ["0 * * * *"]

# Local/default development bindings.
# Real Cloudflare environments are defined below under [env.*].
[[d1_databases]]
binding = "D1_DB"
database_name = "mailagents-local"
database_id = "local-mailagents-d1"

[[r2_buckets]]
binding = "R2_EMAIL"
bucket_name = "mailagents-local-email"

[[queues.producers]]
binding = "EMAIL_INGEST_QUEUE"
queue = "mailagents-local-email-ingest"

[[queues.producers]]
binding = "AGENT_EXECUTE_QUEUE"
queue = "mailagents-local-agent-execute"

[[queues.producers]]
binding = "OUTBOUND_SEND_QUEUE"
queue = "mailagents-local-outbound-send"

[[queues.producers]]
binding = "DEAD_LETTER_QUEUE"
queue = "mailagents-local-dead-letter"

[[queues.consumers]]
queue = "mailagents-local-email-ingest"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "mailagents-local-agent-execute"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "mailagents-local-outbound-send"
max_batch_size = 10
max_batch_timeout = 5

[vars]
SES_REGION = "us-east-1"
SES_FROM_DOMAIN = "local.mailagents.test"
SES_CONFIGURATION_SET = "mailagents-local"
ADMIN_ROUTES_ENABLED = "true"
DEBUG_ROUTES_ENABLED = "true"
IDEMPOTENCY_COMPLETED_RETENTION_HOURS = "168"
IDEMPOTENCY_PENDING_RETENTION_HOURS = "1"

