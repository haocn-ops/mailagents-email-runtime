name = "mailagents-site"
main = "src/site-index.ts"
compatibility_date = "2026-03-16"

[observability]
enabled = true

[vars]
OUTBOUND_PROVIDER = "ses"
RESEND_API_BASE_URL = "https://api.resend.com"
CLOUDFLARE_EMAIL_DOMAIN = "mailagents.net"
SES_REGION = "us-east-1"
SES_FROM_DOMAIN = "mailagents.net"
ADMIN_ROUTES_ENABLED = "false"
DEBUG_ROUTES_ENABLED = "false"
IDEMPOTENCY_COMPLETED_RETENTION_HOURS = "168"
IDEMPOTENCY_PENDING_RETENTION_HOURS = "1"

[[d1_databases]]
binding = "D1_DB"
database_name = "mailagents-dev"
database_id = "ac48363e-4537-4e22-8d95-983b52f05729"

[[r2_buckets]]
binding = "R2_EMAIL"
bucket_name = "mailagents-dev-email"

[[queues.producers]]
binding = "OUTBOUND_SEND_QUEUE"
queue = "mailagents-dev-outbound-send"

[env.production]
name = "mailagents-site"
routes = [
  { pattern = "mailagents.net/*", zone_name = "mailagents.net" },
  { pattern = "www.mailagents.net/*", zone_name = "mailagents.net" }
]

[[env.production.d1_databases]]
binding = "D1_DB"
database_name = "mailagents-production"
database_id = "2c3e9c0a-8551-48b6-b256-97761de3e3f1"

[[env.production.r2_buckets]]
binding = "R2_EMAIL"
bucket_name = "mailagents-production-email"

[[env.production.queues.producers]]
binding = "OUTBOUND_SEND_QUEUE"
queue = "mailagents-production-outbound-send"

[env.production.vars]
OUTBOUND_PROVIDER = "resend"
RESEND_API_BASE_URL = "https://api.resend.com"
CLOUDFLARE_EMAIL_DOMAIN = "mailagents.net"
SES_REGION = "us-east-1"
SES_FROM_DOMAIN = "mailagents.net"
SES_CONFIGURATION_SET = "mailagents-production"
ADMIN_ROUTES_ENABLED = "true"
DEBUG_ROUTES_ENABLED = "false"
IDEMPOTENCY_COMPLETED_RETENTION_HOURS = "168"
IDEMPOTENCY_PENDING_RETENTION_HOURS = "1"
